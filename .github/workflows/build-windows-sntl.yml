name: Build SNTL-RemoteAccess Windows

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"
          channel: "stable"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "stable"
          targets: x86_64-pc-windows-msvc

      - name: Install LLVM
        run: choco install llvm -y

      - name: Flutter pub get
        run: |
          cd flutter
          flutter pub get

      - name: Cargo fetch
        run: cargo fetch

      - name: Build Flutter Windows
        run: |
          cd flutter
          flutter build windows --release

      - name: Rename executable
        run: |
          Rename-Item -Path "flutter\build\windows\x64\runner\Release\rustdesk.exe" `
                      -NewName "SNTL-RemoteAccess.exe"

      - name: Build installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: res/setup.iss
          options: /O+

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: SNTL-RemoteAccess-Windows-Setup
          path: Output\SNTL-RemoteAccess-Setup.exe
          retention-days: 30
