name: Build SNTL-RemoteAccess Windows

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Flutter 3.41.7
        shell: pwsh
        run: |
          $url = "https://storage.googleapis.com/flutter_infra_release/releases/stable/windows/flutter_windows_3.41.7-stable.zip"
          Write-Host "Téléchargement Flutter 3.41.7..."
          Invoke-WebRequest -Uri $url -OutFile "C:\flutter.zip" -UseBasicParsing
          Write-Host "Extraction..."
          Expand-Archive -Path "C:\flutter.zip" -DestinationPath "C:\" -Force
          $env:Path = "C:\flutter\bin;$env:Path"
          [System.Environment]::SetEnvironmentVariable("Path", "C:\flutter\bin;$env:Path", "Machine")
          echo "C:\flutter\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          flutter --version

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "stable"
          targets: x86_64-pc-windows-msvc

      - name: Install LLVM
        run: choco install llvm -y

      - name: Flutter pub get
        shell: pwsh
        run: |
          $env:Path = "C:\flutter\bin;$env:Path"
          Set-Location "$env:GITHUB_WORKSPACE\flutter"
          flutter config --no-analytics
          flutter --version
          flutter pub get

      - name: Cargo fetch
        run: cargo fetch

      - name: Build Flutter Windows
        shell: pwsh
        run: |
          $env:Path = "C:\flutter\bin;$env:Path"
          Set-Location "$env:GITHUB_WORKSPACE\flutter"
          flutter precache --windows
          flutter build windows --release

      - name: Rename executable
        shell: pwsh
        run: |
          $base = "$env:GITHUB_WORKSPACE\flutter\build\windows\x64\runner\Release"
          Get-ChildItem $base
          $exe = Get-ChildItem -Path $base -Filter *.exe | Select-Object -First 1
          if (-not $exe) { throw "No executable found in $base" }
          Rename-Item -Path $exe.FullName -NewName "SNTL-RemoteAccess.exe"
          Write-Host "✅ Renommé $($exe.Name) -> SNTL-RemoteAccess.exe"

      - name: Build installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: res/setup.iss
          options: /O+

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: SNTL-RemoteAccess-Windows-Setup
          path: Output\SNTL-RemoteAccess-Setup.exe
          retention-days: 30
