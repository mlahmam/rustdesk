name: Build SNTL-RemoteAccess Windows

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "stable"
          targets: x86_64-pc-windows-msvc

      - name: Install LLVM
        run: choco install llvm -y

      - name: Install Flutter 3.41.7 manuellement
        shell: pwsh
        run: |
          $url = "https://storage.googleapis.com/flutter_infra_release/releases/stable/windows/flutter_windows_3.41.7-stable.zip"
          Write-Host "Téléchargement Flutter 3.41.7..."
          Invoke-WebRequest -Uri $url -OutFile "C:\flutter.zip"
          Write-Host "Extraction..."
          Expand-Archive -Path "C:\flutter.zip" -DestinationPath "C:\flutter-sdk" -Force
          echo "C:\flutter-sdk\flutter\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Write-Host "✅ Flutter installé"

      - name: Vérifier Flutter
        shell: pwsh
        run: |
          $env:Path = "C:\flutter-sdk\flutter\bin;$env:Path"
          flutter --version

      - name: Flutter pub get
        shell: pwsh
        run: |
          $env:Path = "C:\flutter-sdk\flutter\bin;$env:Path"
          Set-Location "$env:GITHUB_WORKSPACE\flutter"
          flutter config --no-analytics
          flutter pub get

      - name: Cargo fetch
        run: cargo fetch

      - name: Build Flutter Windows
        shell: pwsh
        run: |
          $env:Path = "C:\flutter-sdk\flutter\bin;$env:Path"
          Set-Location "$env:GITHUB_WORKSPACE\flutter"
          flutter build windows --release

      - name: Rename executable
        shell: pwsh
        run: |
          $src = "$env:GITHUB_WORKSPACE\flutter\build\windows\x64\runner\Release\rustdesk.exe"
          if (Test-Path $src) {
            Rename-Item -Path $src -NewName "SNTL-RemoteAccess.exe"
            Write-Host "✅ Renommé"
          } else {
            Write-Host "❌ Fichier non trouvé : $src"
            Get-ChildItem "$env:GITHUB_WORKSPACE\flutter\build\windows\x64\runner\Release\"
            exit 1
          }

      - name: Build installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: res/setup.iss
          options: /O+

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: SNTL-RemoteAccess-Windows-Setup
          path: Output\SNTL-RemoteAccess-Setup.exe
          retention-days: 30
